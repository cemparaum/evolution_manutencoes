<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Evolution Manutenção | O Poder do Sol</title>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        'evo-gold': '#FDD017',
                        'evo-black': '#000000',
                        'evo-cream': '#F8F5ED',
                    }
                }
            }
        };
    </script>
    
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>

    <style>
        body {
            background-color: #000000;
            color: #F8F5ED;
            overflow-x: hidden;
            /* Permite scroll se a tela for muito pequena, mas foca em uma dobra limpa */
            min-height: 100vh; 
        }

        /* --- BACKGROUND CINEMÁTICO --- */
        .video-wrapper {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            height: 100%;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.05); /* Leve scale para permitir zoom out sutil */
            opacity: 0.5;
            filter: grayscale(30%) contrast(120%);
        }
        /* Máscara radial - Menor e mais centralizada */
        .vignette-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.85) 90%);
            z-index: 1;
        }

        /* --- LUZ SOLAR ANIMADA (MOUSE FOLLOWER) --- */
        .solar-glow-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 80vw;
            height: 80vw;
            max-width: 900px;
            max-height: 900px;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
            /* Movido dinamicamente pelo GSAP */
        }
        .solar-glow {
            width: 100%;
            height: 100%;
            /* Core muito mais vibrante e maior espalhamento */
            background: radial-gradient(circle, rgba(253,208,23,0.55) 0%, rgba(253,208,23,0.25) 35%, rgba(253,208,23,0) 70%);
            border-radius: 50%;
            animation: breathe 5s ease-in-out infinite alternate;
            filter: blur(60px);
        }
        @keyframes breathe {
            0% { transform: scale(0.85); opacity: 0.7; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* --- DS BEAM GRID --- */
        .ds-grid {
            position: absolute; inset: 0; z-index: 3; pointer-events: none; display: flex; 
            width: 100%; max-width: 90rem; margin: 0 auto; opacity: 0.45; /* Contraste aumentado */
            border-right: 1px solid rgba(253, 208, 23, 0.5); /* Borda mais visível */
        }
        .ds-col { flex: 1; border-left: 1px solid rgba(253, 208, 23, 0.5); position: relative; }
        @keyframes beam-fall {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        .beam {
            position: absolute; top: 0; left: -1px; width: 2px;
            /* Brilho extra no feixe de luz que cai */
            background: linear-gradient(to bottom, transparent, #FDD017, #ffffff, #FDD017, transparent);
            box-shadow: 0 0 15px #FDD017;
            animation: beam-fall 4s linear infinite;
        }

        /* --- TYPOGRAPHY & CURSOR --- */
        .typewriter-cursor {
            display: inline-block;
            width: 4px;
            height: 0.9em;
            background-color: #FDD017;
            margin-left: 6px;
            animation: blink 0.8s step-end infinite;
            transform: translateY(2px);
            box-shadow: 0 0 8px #FDD017;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- REMOVED DEAD BUTTON CSS --- */



    </style>
</head>
<body class="relative flex flex-col justify-between">

    <!-- 1. CINEMATIC BACKGROUND -->
    <div class="video-wrapper" id="video-bg">
        <video autoplay loop muted playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-solar-panels-in-a-field-under-the-sun-43343-large.mp4" type="video/mp4">
        </video>
        <div class="vignette-overlay"></div>
    </div>

    <!-- 2. SOLAR GLOW (Mouse Follower) -->
    <div class="solar-glow-wrapper">
        <div class="solar-glow"></div>
    </div>

    <!-- 3. DS ENERGY BEAMS -->
    <div class="ds-grid hidden md:flex">
        <!-- Linha 1 (Lateral Esquerda) -->
        <div class="ds-col"><div class="beam h-[200px]" style="animation-duration: 5s; animation-delay: 1s;"></div></div>
        <!-- Linhas Centrais -->
        <div class="ds-col"><div class="beam h-[150px]" style="animation-duration: 4s; animation-delay: 0s;"></div></div>
        <div class="ds-col"><div class="beam h-[250px]" style="animation-duration: 5.5s; animation-delay: 1.5s;"></div></div>
        <div class="ds-col"><div class="beam h-[120px]" style="animation-duration: 3.5s; animation-delay: 2.5s;"></div></div>
        <div class="ds-col"><div class="beam h-[180px]" style="animation-duration: 4.5s; animation-delay: 0.5s;"></div></div>
        <!-- Linha 6 (Lateral Direita colada na borda do Grid) -->
        <div class="beam h-[220px]" style="left: auto; right: -1px; animation-duration: 6s; animation-delay: 2s;"></div>
    </div>

    <!-- 4. NAVBAR -->
    <nav class="relative z-20 w-full px-6 md:px-12 py-6 flex justify-between items-center opacity-0" id="nav-animate">
        <!-- Brand Badge: Um 'pill' elegante na cor Creme do cliente para proteger a logo JPEG e manter 100% das cores originais -->
        <div class="bg-evo-cream py-2.5 px-5 md:py-3 md:px-6 rounded-2xl shadow-[0_10px_40px_rgba(253,208,23,0.15),inset_0_2px_0_rgba(255,255,255,1)] border border-evo-gold/20 flex items-center justify-center transform transition-transform hover:scale-105">
            <img src="raw_file/logo_evolution_manutencao.jpg" alt="Evolution Logo" class="h-12 md:h-16 lg:h-20 object-contain mix-blend-multiply">
        </div>
        <div class="hidden md:flex gap-8 text-[11px] font-extrabold tracking-[0.2em] text-white/50 uppercase">
            <a href="#" class="hover:text-evo-gold transition-colors">Início</a>
            <a href="#" class="hover:text-evo-gold transition-colors">Especialidade</a>
            <a href="#" class="hover:text-evo-gold transition-colors">Contato</a>
        </div>
    </nav>

    <!-- 5. MAIN CONTENT (Compact & Centered) -->
    <main class="relative z-10 flex-1 flex flex-col items-center justify-center px-4 w-full max-w-5xl mx-auto text-center mt-8 md:mt-12 mb-16">
        
        <!-- Badge -->
        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-evo-gold/30 bg-evo-gold/5 backdrop-blur-sm mb-6 opacity-0" id="badge-animate">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-evo-gold opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-evo-gold"></span>
            </span>
            <span class="text-[10px] font-bold tracking-widest uppercase text-evo-gold">A Nova Era da Manutenção</span>
        </div>

        <!-- Headline -->
        <h1 class="text-3xl md:text-5xl lg:text-[4rem] font-extrabold leading-[1.1] tracking-tight mb-6 min-h-[100px] md:min-h-[140px] flex items-center justify-center flex-wrap">
            <span id="headline"></span><span class="typewriter-cursor"></span>
        </h1>

        <!-- Subheadline -->
        <p class="text-base md:text-xl font-medium text-white/70 max-w-2xl leading-relaxed mb-8 opacity-0" id="subheadline">
            Especialistas em manutenção que transformam problemas em <span class="text-evo-cream font-bold relative inline-block">potência<span class="absolute bottom-1 left-0 w-full h-1 bg-evo-gold/40 -z-10"></span></span> e tranquilidade.
        </p>

        <!-- CTA (Hero Pattern do DS) -->
        <div class="opacity-0 mb-12" id="cta-animate">
            <a class="group isolate inline-flex cursor-pointer overflow-hidden transition-all duration-300 hover:scale-[1.02] hover:shadow-[0_0_40px_10px_rgba(253,208,23,0.35)] bg-gradient-to-b from-[#F8F5ED]/10 via-[#F8F5ED]/0 to-[#F8F5ED]/5 rounded-full relative shadow-[0_0_20px_rgba(253,208,23,0.2),0_4px_30px_rgba(253,208,23,0.1)]" href="#contato">
                <!-- Borda Giratória (Spin Animation) -->
                <div class="absolute inset-0 overflow-hidden rounded-full">
                    <div class="absolute inset-[-100%] w-[300%] h-[300%] left-[-100%] top-[-100%] animate-[spin_4s_linear_infinite]" style="background: conic-gradient(from 0deg, transparent 0deg, transparent 80deg, rgba(253,208,23,0.9) 180deg, transparent 280deg, transparent 360deg);"></div>
                </div>
                <!-- Fundo Escuro Interno -->
                <div class="absolute inset-[1px] rounded-full backdrop-blur-xl z-0 bg-[#000000]/90"></div>
                
                <!-- Conteúdo Interno -->
                <div class="z-10 flex gap-4 sm:w-auto overflow-hidden w-full rounded-full pt-3 pr-5 pb-3 pl-4 relative items-center">
                    
                    <!-- Ícone com Gradiente (Melhoria Criativa) -->
                    <div class="relative z-20 w-8 h-8 rounded-full bg-gradient-to-b from-[#FDD017] to-yellow-600 flex items-center justify-center shadow-lg shadow-[#FDD017]/30 ring-1 ring-white/20 group-hover:rotate-180 transition-transform duration-700">
                        <i data-lucide="sun" class="w-4 h-4 text-[#000000] fill-[#000000]"></i>
                    </div>
                    
                    <!-- Texto -->
                    <span class="whitespace-nowrap relative z-10 font-bold tracking-widest text-sm md:text-base text-[#F8F5ED]/95 group-hover:text-[#FDD017] transition-colors uppercase">Recupere Sua Energia</span>
                    
                    <!-- Seta Direita -->
                    <span class="inline-flex items-center justify-center z-10 bg-white/10 w-7 h-7 rounded-full ml-1 relative group-hover:translate-x-1 group-hover:bg-[#FDD017] group-hover:text-[#000000] transition-all duration-300 text-white/80">
                        <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                    </span>
                    
                </div>
            </a>
        </div>
    </main>



    <!-- INITIALIZATION SCRIPT -->
    <script>
        lucide.createIcons();

        document.addEventListener("DOMContentLoaded", () => {
            gsap.registerPlugin(TextPlugin);

            const tl = gsap.timeline();

            // Cinematic slight zoom out on background video
            gsap.to("#video-bg video", {
                scale: 1,
                duration: 5,
                ease: "power2.out"
            });

            // Fade in Nav & Badge
            tl.to("#nav-animate, #badge-animate", {
                y: 0,
                opacity: 1,
                duration: 0.8,
                stagger: 0.2,
                ease: "power3.out",
                delay: 0.2
            })
            
            // Typewriter Effect
            .to("#headline", {
                duration: 2.5,
                text: "Seu Investimento Solar Merece Evoluir.<br><span style='color: #FDD017;'>Nós Garantimos.</span>",
                ease: "none",
            })
            
            // Subheadline Slide Up
            .fromTo("#subheadline", 
                { y: 20, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.8, ease: "back.out(1.2)" }
            )
            
            // CTA Button pop-in
            .fromTo("#cta-animate", 
                { scale: 0.9, opacity: 0 },
                { scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.5)" },
                "-=0.4"
            )


            // --- ALTA PERFORMANCE MOUSE FOLLOWER (GSAP QuickTo) ---
            const glowWrapper = document.querySelector('.solar-glow-wrapper');
            
            // Centraliza o ponto de origem no meio da div
            gsap.set(glowWrapper, { xPercent: -50, yPercent: -50 });
            
            // O quickTo foi desenhado especificamente pelo GSAP para seguir cursores em 60fps sem engasgos
            const xTo = gsap.quickTo(glowWrapper, "x", { duration: 0.8, ease: "power3.out" });
            const yTo = gsap.quickTo(glowWrapper, "y", { duration: 0.8, ease: "power3.out" });

            // Captura o movimento do mouse
            window.addEventListener("mousemove", (e) => {
                xTo(e.clientX);
                yTo(e.clientY);
            });
            
            // Centraliza o brilho de forma suave caso o usuário demore a mover o mouse no carregamento inicial
            xTo(window.innerWidth / 2);
            yTo(window.innerHeight / 2);

            // Stop blinking cursor after a while
            setTimeout(() => {
                const cursor = document.querySelector('.typewriter-cursor');
                if(cursor) {
                    cursor.style.opacity = '0';
                    cursor.style.animation = 'none';
                }
            }, 6000);
        });
    </script>
</body>
</html>
